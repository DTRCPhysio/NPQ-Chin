<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>頸痛問卷（NPQ）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#f5f5f7; padding:20px; }
.container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
h1 { font-size:1.6rem; margin-top:10px; }
.instructions { font-size:0.95rem; color:#444; }
table { width:100%; border-collapse:collapse; margin-top:1rem; }
th, td { padding:10px; vertical-align:top; }
tr:nth-child(even) { background:#fafafa; }
button { margin-top:20px; padding:10px 20px; font-size:1rem; border:none; border-radius:5px; background:#007aff; color:#fff; cursor:pointer; }
button:hover { background:#005fcc; }

.modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
.modal-content { background:#fff; margin:10% auto; padding:20px; border-radius:10px; width:90%; max-width:400px; text-align:center; }
.close { float:right; font-size:28px; cursor:pointer; }
.result-score { font-size:1.4rem; font-weight:bold; margin:10px 0; }
.small { font-size:0.85rem; color:#555; }
</style>
</head>

<body>
<div class="container">
<h1>頸痛問卷（NPQ）</h1>
<p class="instructions">
我們設計本問卷的目的，是了解頸痛如何影響你應付日常生活的能力。請回答每一個部分的問題，並在最貼切的答案上作出選擇。（第 9、10 題為非必答）
</p>

<table>
<tr><th>題號</th><th>問題</th><th>回答</th></tr>

<!-- Q1 -->
<tr>
<td>1</td>
<td>現在頸痛的程度</td>
<td>
<label><input type="radio" name="q1" value="0">沒有頸痛</label><br>
<label><input type="radio" name="q1" value="1">溫和</label><br>
<label><input type="radio" name="q1" value="2">中等</label><br>
<label><input type="radio" name="q1" value="3">很嚴重</label><br>
<label><input type="radio" name="q1" value="4">簡直不可想像</label>
</td>
</tr>

<!-- Q2 -->
<tr>
<td>2</td>
<td>頸痛與睡眠</td>
<td>
<label><input type="radio" name="q2" value="0">頸痛從不干擾我睡眠</label><br>
<label><input type="radio" name="q2" value="1">頸痛有時會干擾我睡眠</label><br>
<label><input type="radio" name="q2" value="2">頸痛經常會干擾我睡眠</label><br>
<label><input type="radio" name="q2" value="3">頸痛使我每晚睡少於五小時</label><br>
<label><input type="radio" name="q2" value="4">頸痛使我每晚睡少於兩小時</label>
</td>
</tr>

<!-- Q3 -->
<tr>
<td>3</td>
<td>手臂在夜晚感到發麻或刺痛</td>
<td>
<label><input type="radio" name="q3" value="0">從不</label><br>
<label><input type="radio" name="q3" value="1">有時</label><br>
<label><input type="radio" name="q3" value="2">經常</label><br>
<label><input type="radio" name="q3" value="3">使我睡少於五小時</label><br>
<label><input type="radio" name="q3" value="4">使我睡少於兩小時</label>
</td>
</tr>

<!-- Q4 -->
<tr>
<td>4</td>
<td>每天症狀持續的時間</td>
<td>
<label><input type="radio" name="q4" value="0">整天正常</label><br>
<label><input type="radio" name="q4" value="1">不超過一小時</label><br>
<label><input type="radio" name="q4" value="2">一至四小時</label><br>
<label><input type="radio" name="q4" value="3">超過四小時</label><br>
<label><input type="radio" name="q4" value="4">整天都有</label>
</td>
</tr>

<!-- Q5 -->
<tr>
<td>5</td>
<td>攜帶物件</td>
<td>
<label><input type="radio" name="q5" value="0">可攜帶重物</label><br>
<label><input type="radio" name="q5" value="1">可攜帶但會痛</label><br>
<label><input type="radio" name="q5" value="2">只能拿中等重量</label><br>
<label><input type="radio" name="q5" value="3">只能拿輕物</label><br>
<label><input type="radio" name="q5" value="4">甚麼都拿不起來</label>
</td>
</tr>

<!-- Q6 -->
<tr>
<td>6</td>
<td>閱讀及看電視</td>
<td>
<label><input type="radio" name="q6" value="0">沒有困難</label><br>
<label><input type="radio" name="q6" value="1">坐姿適當即可</label><br>
<label><input type="radio" name="q6" value="2">會產生額外痛楚</label><br>
<label><input type="radio" name="q6" value="3">痛楚使我提早結束</label><br>
<label><input type="radio" name="q6" value="4">根本無法閱讀或看電視</label>
</td>
</tr>

<!-- Q7 -->
<tr>
<td>7</td>
<td>工作、家務之類</td>
<td>
<label><input type="radio" name="q7" value="0">可做平時工作</label><br>
<label><input type="radio" name="q7" value="1">可做但會痛</label><br>
<label><input type="radio" name="q7" value="2">只能做一半</label><br>
<label><input type="radio" name="q7" value="3">只能做四分之一</label><br>
<label><input type="radio" name="q7" value="4">根本無法工作</label>
</td>
</tr>

<!-- Q8 -->
<tr>
<td>8</td>
<td>社交活動</td>
<td>
<label><input type="radio" name="q8" value="0">正常</label><br>
<label><input type="radio" name="q8" value="1">正常但會痛</label><br>
<label><input type="radio" name="q8" value="2">仍可外出</label><br>
<label><input type="radio" name="q8" value="3">只能在家</label><br>
<label><input type="radio" name="q8" value="4">沒有社交生活</label>
</td>
</tr>

<!-- Q9 optional -->
<tr>
<td>9</td>
<td>駕駛（非必答）</td>
<td>
<label><input type="radio" name="q9" value="0">可駕駛</label><br>
<label><input type="radio" name="q9" value="1">可駕駛但會痛</label><br>
<label><input type="radio" name="q9" value="2">有時受限</label><br>
<label><input type="radio" name="q9" value="3">無法駕駛</label>
</td>
</tr>

<!-- Q10 optional -->
<tr>
<td>10</td>
<td>與上次相比（非必答）</td>
<td>
<label><input type="radio" name="q10" value="0">好了很多</label><br>
<label><input type="radio" name="q10" value="1">稍為好了</label><br>
<label><input type="radio" name="q10" value="2">一樣</label><br>
<label><input type="radio" name="q10" value="3">稍為差了</label><br>
<label><input type="radio" name="q10" value="4">差了很多</label>
</td>
</tr>

</table>

<button onclick="openPassword()">展示給治療師</button>
</div>

<!-- Modal -->
<div id="resultModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <div id="passwordSection">
      <p>請輸入密碼：</p>
      <input type="password" id="pwdInput">
      <button onclick="verifyPassword()">確認</button>
    </div>

    <div id="resultSection" style="display:none;">
      <h3>結果</h3>
      <p class="result-score">NPQ 百分比分數：<span id="npqScore"></span></p>
      <p class="small">（第 1–8 題計算：總分 ÷ 32 × 100）</p>
    </div>
  </div>
</div>

<script>
function openPassword(){
  document.getElementById("resultModal").style.display = "block";
}

function closeModal(){
  document.getElementById("resultModal").style.display = "none";
  document.getElementById("passwordSection").style.display = "block";
  document.getElementById("resultSection").style.display = "none";
  document.getElementById("pwdInput").value = "";
}

function verifyPassword(){
  const pwd = document.getElementById("pwdInput").value;
  if (pwd !== "225500"){
    alert("密碼錯誤");
    return;
  }
  calculateNPQ();
  document.getElementById("passwordSection").style.display = "none";
  document.getElementById("resultSection").style.display = "block";
}

function calculateNPQ(){
  let total = 0;
  let answeredAll = true;

  for (let i = 1; i <= 8; i++){
    const radios = document.getElementsByName("q" + i);
    let answered = false;
    for (const r of radios){
      if (r.checked){
        total += Number(r.value);
        answered = true;
      }
    }
    if (!answered) answeredAll = false;
  }

  if (!answeredAll){
    alert("請完成第 1–8 題以計算分數。");
    return;
  }

  const percentage = (total / 32) * 100;
  document.getElementById("npqScore").textContent = percentage.toFixed(1) + "%";
}
</script>

</body>
</html>
